<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Doação de Sangue</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="assets/image-Photoroom (1).png" alt="logo-sangue" class="logo">
        <h1> Doaçao de Sangue </h1>
    </header>

    <main>
        <div class="container">
            <div class="titulo">
                <h3>Cadastre-se para ser um doador(a)</h3>
            </div>

            <form>
                <div>
                    <input type="text" id="nome" placeholder="Nome completo" required><hr>
                </div>
                <div>
                    <input type="email" id="email" placeholder="Endereço de email" required><hr>
                </div>
                <div>
                    <input type="tel" id="telefone" placeholder="Telefone para contato" required><hr>
                </div>
                <div>
                    <input type="number" id="idade" placeholder="Idade" required><hr>
                </div>
                <div>
                    <input type="number" id="peso" placeholder="Peso" required><hr>
                </div>
                <div>
                    <input type="text" id="cidade" placeholder="Cidade" required><hr>
                </div>
                <div>
                    <input type="text" id="estado" placeholder="Estado" required><hr>
                </div>
                <div>
                    <label>Tipo sanguíneo:</label>
                <select id="tipoSangue" required>
                    <option selected disabled value="">Selecione</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                </div>
                    
                <button type="submit">Cadastrar</button>

            </form>

        </div>
    </main>
    
</body>
</html>
